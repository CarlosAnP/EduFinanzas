services:
  - type: web
    name: edufinanzas-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edufinanzas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://edu-finanzas-beta.vercel.app"
      - key: FRONTEND_URL
        value: "https://edu-finanzas-beta.vercel.app"

  - type: web
    name: edufinanzas-frontend
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: "https://edu-finanzas-beta.vercel.app/api"

databases:
  - name: edufinanzas-db
    databaseName: edufinanzas
    user: edufinanzas
