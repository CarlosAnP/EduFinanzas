services:
  - type: web
    name: edufinanzas-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --timeout 90"
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edufinanzas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://edu-finanzas-beta.vercel.app"
      - key: FRONTEND_URL
        value: "https://edu-finanzas-beta.vercel.app"

databases:
  - name: edufinanzas-db
    databaseName: edufinanzas
    user: edufinanzas
